apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: example-runtime
  namespace: kbm-g-np-postech-a
spec:
  mlPolicy:
    numNodes: 1
    torch:
      numProcPerNode: auto
  template:
    spec:
      replicatedJobs:
        - groupName: default
          name: node
          replicas: 1
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
            spec:
              template:
                metadata:
                  annotations:
                    sidecar.istio.io/inject: "false"
                spec:
                  containers:
                    # Replace REGISTRY_URL/REGISTRY_NAMESPACE to match your
                    # .env; keep the image name (`kubeflow-train`) in sync
                    # with docker/docker_build.sh.
                    - image: REGISTRY_URL/REGISTRY_NAMESPACE/kubeflow-train:latest
                      name: node
                      imagePullPolicy: Always
