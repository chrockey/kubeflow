# Template for creating a WANDB API-key secret in your Kakao Cloud namespace.
#
# Usage:
#   1. Copy this file to `wandb-secret.yaml` (gitignored).
#   2. Replace <YOUR_WANDB_API_KEY> with your key from https://wandb.ai/authorize
#   3. kubectl apply -f kubeflow/wandb-secret.yaml
#
# The TrainJob references this secret by name via `secretKeyRef`, so you never
# have to paste the raw key into any YAML that might end up in git.
apiVersion: v1
kind: Secret
metadata:
  name: wandb-secret
  namespace: kbm-g-np-postech-a
type: Opaque
stringData:
  api-key: <YOUR_WANDB_API_KEY>
